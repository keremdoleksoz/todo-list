<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
</head>

<body>
    <main>
        <section>
            <h3>Categories</h3>
            <ul id="categoryList"></ul>
            <button id="addCategoryButton">+ Add Category</button>
        </section>

        <dialog id="categoryDialog">
            <form id="categoryForm">
                <h3>Add Category</h3>

                <label for="dialogCategoryName">Category Name</label>
                <input id="dialogCategoryName" name="dialogCategoryName" type="text" required>

                <div class="actions">
                    <button type="button" id="cancelDialog">Cancel</button>
                    <button type="submit" id="submitDialog">Submit</button>
                </div>
            </form>
        </dialog>

        <div>
            <label for="sortingOptions">Sort by</label>
            <select name="sortingOptions" id="sortingOptions">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="nameAsc">Name A-Z</option>
                <option value="nameDsc">Name Z-A</option>
                <option value="byPriority">By priority</option>
                <option value="byCompletion">By completion</option>
            </select>
        </div>

        <div>
            <label for="searchBox">Search</label>
            <input id="searchBox" name="searchBox" type="text">
        </div>

        <section>
            <h3>Tasks</h3>
            <ul id="taskList"></ul>
            <label for="taskInput">Enter a task</label>
            <input type="text" id="taskInput" class="task" placeholder="...">
            <button id="addQuickTask">+ Add Task</button> <button id="addDetailedTask">+ Add Detailed Task</button>
        </section>

        <dialog id="taskDialog">
            <form id="taskForm">
                <h3>Add detailed task</h3>

                <label for="dialogTaskName">Task Name</label>
                <input id="dialogTaskName" name="dialogTaskName" type="text" required>

                <label for="startDate">Start date:</label>
                <input type="date" id="startDate" name="startDate">

                <label for="endDate">Deadline date:</label>
                <input type="date" id="endDate" name="endDate">

                <label for="categoryOptions">Category: </label>
                <select name="categoryOptions" id="categoryOptions">
                    <option value="default">Default</option>
                </select>

                <label for="priorityOptions">Priority: </label>
                <select name="priorityOptions" id="priorityOptions">
                    <option value="unassigned">Unassigned</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>

                <div class="actions">
                    <button type="button" id="cancelTaskDialog">Cancel</button>
                    <button type="submit" id="submitTaskDialog">Submit</button>
                </div>
            </form>
        </dialog>
    </main>

    <script src="app.js"></script>
</body>

</html>
